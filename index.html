const Scanner = (() => {

  function pushToFeed(token,src){
    if(!token?.ca)return;
    token.ca=token.ca.toLowerCase();
    if(!token._firstSeen)token._firstSeen=Date.now();
    if(src==='pump'&&token.name&&token.name!=='UNKNOWN'&&!token.identity)token.identity={name:token.name,symbol:token.symbol,ca:token.ca};
    if(Date.now()<S.freezeUntil){
      if(!feedMap.has(token.ca)){feedMap.set(token.ca,token);feedBus.push(token);}
      return;
    }
    if(feedMap.has(token.ca)){
      const ex=feedMap.get(token.ca);ex.source=src;RenderEngine.markDirty(ex);
      if(!ex._enriched)AiEngine.enrichPipeline(ex);
    }else{
      RenderEngine.renderSkeleton(token.ca);
      feedMap.set(token.ca,token);
      feedBus.push(token);
      AiEngine.enrichPipeline(token);
    }
    while(feedBus.length>C.MAX_TOKENS){const rm=feedBus.shift();if(rm?.ca){feedMap.delete(rm.ca);RenderEngine.removeCard(rm.ca)}}
  }
  function connectWS(){
    try{
      const ws=new WebSocket('wss://pumpportal.fun/api/data');
      ws.onopen=()=>{ws.send(JSON.stringify({method:'subscribeNewToken'}));window.setEp('PUMP-WS','on',Date.now());};
      ws.onmessage=e=>{
        try{
          const d=JSON.parse(e.data);
          if(d?.mint){
            if(S.wsBuffer.length<S.wsMaxBuffer) S.wsBuffer.push({ca:d.mint,symbol:d.symbol,name:d.name});
          }
        }catch(e){}
      };
      ws.onerror=()=>window.setEp('PUMP-WS','off');

  }
  return{pushToFeed,connectWS,performScan,requestScan,fetchDexTrending,flushWsBuffer};

function startup(){
  RenderEngine.initDashboard();RenderEngine.initHeroPanel();Scanner.connectWS();updateEpBar();updateProfileBadge();updateRiskBadge();
  Scheduler.register('timer',()=>{
    $('timerBadge').textContent='⏱ '+Math.max(0,Math.floor((S.nextScan-Date.now())/1000))+'s'+(S.isAuto?' AUTO':'');
    updateEpBar();updateRiskBadge();updateFreezeIndicator();
    Scanner.flushWsBuffer();
  },1000,'background');
  Scheduler.register('autoScan',()=>{
    if(S.isAuto&&Date.now()>S.nextScan&&Date.now()>S.freezeUntil)Scanner.requestScan();
  },5000,'background');
  Scheduler.register('heroUpdate',()=>AiEngine.updateHero(),5000,'background');
  Scheduler.register('evalQueue',()=>AiEngine.processEvalQueue(),15000,'background');
  Scheduler.register('adaptiveLoop',()=>AiEngine.adaptiveLoop(),40000,'background');
  Scheduler.register('selfEvalV3',()=>AiEngine.selfEvaluateV3(),60000,'background');
  Scheduler.register('capitalFlow',()=>AiEngine.detectCapitalFlow(),120000,'background');
  Scheduler.register('correlationUpdate',()=>AiEngine.updateCorrelationMatrix(),300000,'background');
  Scheduler.register('institutionalRisk',()=>AiEngine.calcInstitutionalRisk(),45000,'background');
  Scheduler.register('flowMapUpdate',()=>AiEngine.updateFlowMap(),90000,'background');
  Scheduler.startVisual();Scheduler.startBackground();
  addAILog('🚀 NEBULA V99 FINAL · Full Patch Active','success');
  if(S.isAuto&&Date.now()>S.freezeUntil)Scanner.requestScan();
}
setTimeout(()=>{
  $('scanBtn').onclick=Scanner.requestScan;$('miniFabScan').onclick=Scanner.requestScan;$('trendBtn').onclick=Scanner.fetchDexTrending;
  $('autoPumpToggleBtn').onclick=()=>{S.isAuto=!S.isAuto;$('autoPumpToggleBtn').classList.toggle('active',S.isAuto);};
  $('floatingSnipeBtn').onclick=()=>{const h=S.hero;if(h){openDexLink(h);}else{window.open('https://dexscreener.com/solana','_blank');}};
  $('modeSelect').addEventListener('change',updateProfileBadge);$('riskSelect').addEventListener('change',updateProfileBadge);
  $('alphaBtn').onclick=showAlphaPanel;$('explainBtn').onclick=showExplainableAI;$('flowBtn').onclick=showFlowMap;
  $('debugBtn').onclick=()=>{const ov=$('overlayPanel'),cnt=$('overlayContent');ov.style.display='block';const pred=AiEngine.getPredictionMetrics();cnt.innerHTML='<div><b>🔒 API ROUTING</b></div><div>Helius: Worker Proxy ✅</div><div>ANKR: Direct ✅</div><div>Solana: Direct ✅</div>'+C.ENDPOINTS.map(n=>'<div>'+ep[n]+' '+n+': '+eph[n].sr+'%</div>').join('')+'<div style="margin-top:10px"><b>V99</b></div><div>Freeze: '+(S.freezeUntil>Date.now()?'ACTIVE ('+Math.ceil((S.freezeUntil-Date.now())/1000)+'s)':'OFF')+'</div><div>WS Buffer: '+S.wsBuffer.length+'</div><div style="margin-top:10px"><b>AI</b></div><div>Accuracy: '+S.learning.accuracy+'% | F1: '+pred.f1+'%</div><div>Precision: '+pred.precision+'% | Recall: '+pred.recall+'%</div><div>Brier Score: '+pred.brier+' | Samples: '+pred.total+'</div><div>Bayesian Prob: '+pred.bayesian+'%</div><div>Market: '+S.market.regime+' | Rules: '+S.learning.selfEvoRules.length+'</div><div>Wallet Graph: '+S.walletGraph.size+' nodes | Correlations: '+S.correlationMatrix.size+' pairs</div><div>Institutional Risk: '+S.institutionalRisk.total+'% | Hedge: '+S.hedgeRatio+'%</div>';};
  $('overlayClose').onclick=()=>{$('overlayPanel').style.display='none'};
  document.addEventListener('click',function(e){const btn=e.target.closest('[data-action]');if(!btn)return;e.stopPropagation();const a=btn.dataset.action,ca=btn.dataset.ca;if(a==='watch'){const idx=S.watchlist.findIndex(w=>w.ca===ca);if(idx>=0){S.watchlist.splice(idx,1);btn.classList.remove('watch-active')}else{S.watchlist.push({ca,added:Date.now()});btn.classList.add('watch-active')}}else if(a==='copyca'){copyToClipboard(ca);btn.textContent='✅';setTimeout(()=>btn.textContent='CA',1200);}else if(a==='phantom'){const url='https://phantom.app/ul/v1/swap/'+ca;try{window.open(url,'_blank','noopener,noreferrer')}catch(e){window.location.href=url}}else if(a==='pump'){const url='https://pump.fun/coin/'+ca;try{window.open(url,'_blank','noopener,noreferrer')}catch(e){window.location.href=url}}else if(a==='dex'){const t=feedMap.get(ca);if(!t)return;openDexLink(t);}else if(a==='buy'){const t=feedMap.get(ca);if(!t)return;AiEngine.addToEvalQueue(ca,t.price||0,t.decision||'BUY')}});
},500);
startup();
})();
</script>
</body>
</html>
