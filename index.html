    const fullKey = CACHE_PREFIX + key;

    if (this._ram.has(fullKey)) {
      const entry = this._ram.get(fullKey);
      if (Date.now() - entry.time < this._ramTTL) return entry.data;

      failures: 0,
      disabled: false,
      cooldownUntil: 0,
      threshold,

    const cb = this.services[service];
    if (!cb) return;

      cb.disabled = false;

  isAllowed(service) {

    return false;
  },

  getStatus(service) {
    const cb = this.services[service];
    if (!cb) return 'active';
    return cb.disabled ? 'disabled' : 'active';

};

function classifyRugStatus(token) {
  if (!token._rug || token._rugError) return { status: 'UNKNOWN', class: 'rug-unknown', label: 'UNKNOWN' };
  const score = token._rug.score || 0;
  if (score < 20) return { status: 'SAFE', class: 'rug-safe', label: 'SAFE' };
  if (score <= 50) return { status: 'WARNING', class: 'rug-warning', label: 'WARNING' };
  return { status: 'RISK', class: 'rug-risk', label: 'RISK' };
}

async function enrichDex(token){
  if(token._dexDone)return;
  const cacheKey = 'dex_' + token.ca;
  const cached = StorageInterface.load(cacheKey);
  if(cached) {
    Object.assign(token, cached);
    token._dexDone = true; token._fromCache = true;
    window.setEp('DEX','on');
    return;
  }

  // PATH 1: Worker (if circuit breaker allows)
  if(CircuitBreaker.isAllowed('dex')){
    try{
      const res=await fetchURL(DEX_PROXY+token.ca,{},5000);
      const json=await res.json();
      if(json && json.pairs && Array.isArray(json.pairs) && json.pairs.length>0){
        processDexData(token, json);
        token._dexDone=true;token._dexError=false;window.setEp('DEX','on');
        CircuitBreaker.recordSuccess('dex');
        StorageInterface.save(cacheKey, {price:token.price,liq:token.liq,vol1h:token.vol1h,mcap:token.mcap,identity:token.identity,pair:token.pair,dexUrl:token.dexUrl});
        return;
      }
      CircuitBreaker.recordFailure('dex');
    }catch(e){CircuitBreaker.recordFailure('dex');}
  }

  // PATH 2: Browser Direct
  try{
    const res=await fetchURL('https://api.dexscreener.com/latest/dex/tokens/'+token.ca,{},5000);
    const json=await res.json();
    if(json && json.pairs && Array.isArray(json.pairs) && json.pairs.length>0){
      processDexData(token, json);
      token._dexDone=true;token._dexError=false;window.setEp('DEX','on');
      StorageInterface.save(cacheKey, {price:token.price,liq:token.liq,vol1h:token.vol1h,mcap:token.mcap,identity:token.identity,pair:token.pair,dexUrl:token.dexUrl});
      return;
    }
  }catch(e){}

  token._dexError=true;token._dexDone=true;window.setEp('DEX','off');
}

function processDexData(token, json){
  json.pairs.sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0));
  const p=json.pairs[0];
  if(safeValue(p.priceUsd))token.price=safeNum(p.priceUsd);
  if(safeValue(p.fdv))token.mcap=safeNum(p.fdv);
  if(safeValue(p.liquidity?.usd))token.liq=safeNum(p.liquidity.usd);
  if(safeValue(p.volume?.h1))token.vol1h=safeNum(p.volume.h1);
  if(p.volume?.h1&&p.txns?.h1){const tv=safeNum(p.volume.h1)||0,buys=safeNum(p.txns.h1.buys)||0,sells=safeNum(p.txns.h1.sells)||0;if(tv>0&&(buys+sells)>0){token.buyVol=Math.round(tv*buys/(buys+sells));token.sellVol=Math.round(tv*sells/(buys+sells));token._hasFlow=true}}

}

function renderDetail(t){
const hd=t._hel||{};const r=t._rug||{};const rs=t._reasons||{pros:[],cons:[]};const exit=t._exitPlan;const mc=t._mcResult||{};const backtest=t._backtest;const correlations=t._correlations||[];const obs=t._orderBlocks||[];const fvgs=t._fvgs||[];const exp=t._explain||AiEngine.calcExplain(t);
const dexUrl=getTokenDexUrl(t);
const rugStatus=t._rugStatus||AiEngine.classifyRugStatus(t);
return'<div class="detail-section"><div class="section-title">DATA</div><div class="hud-gauge"><span class="gauge-label">PRICE</span><span class="gauge-value" style="color:#ffd700;width:auto">'+fmtPrice(t.price)+'</span></div><div class="hud-gauge"><span class="gauge-label">LIQ</span><span class="gauge-value" style="color:#0f6;width:auto">'+(safeValue(t.liq)?'$'+fmtNum(t.liq):'--')+'</span></div><div class="hud-gauge"><span class="gauge-label">WALLET</span><span class="gauge-value" style="width:auto">'+getWalletBadge(t)+getClusterBadge(t)+(t._fromCache?' <span class="cache-badge">CACHE</span>':'')+'</span></div><div class="hud-gauge"><span class="gauge-label">RUG</span><span class="gauge-value" style="width:auto">'+getRugBadge(t)+'</span></div><div style="margin-top:4px;text-align:center"><a class="dex-link-btn" href="'+dexUrl+'" target="_blank">DEXSCREENER</a></div></div><div class="detail-section"><div class="section-title">XAI</div><div class="hud-gauge"><span class="gauge-label">Liq</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.liq||0)+'%;background:#0f6"></div></div><span class="gauge-value">'+(exp.liq||0)+'%</span></div><div class="hud-gauge"><span class="gauge-label">Vol</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.vol||0)+'%;background:#0ff"></div></div><span class="gauge-value">'+(exp.vol||0)+'%</span></div><div class="hud-gauge"><span class="gauge-label">Holder</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.holder||0)+'%;background:#fa0"></div></div><span class="gauge-value">'+(exp.holder||0)+'%</span></div><div class="hud-gauge"><span class="gauge-label">Wallet</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.wallet||0)+'%;background:#b0f"></div></div><span class="gauge-value">'+(exp.wallet||0)+'%</span></div><div class="hud-gauge"><span class="gauge-label">Mom</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.momentum||0)+'%;background:#ffd700"></div></div><span class="gauge-value">'+(exp.momentum||0)+'%</span></div><div class="hud-gauge"><span class="gauge-label">Sec</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(exp.security||0)+'%;background:'+(exp.security>50?'#0f6':'#f44')+'"></div></div><span class="gauge-value">'+(exp.security||0)+'%</span></div></div><div class="detail-section"><div class="section-title">STRUCTURE</div><div class="hud-gauge"><span class="gauge-label">MKT</span><span class="gauge-value" style="color:#b0f;width:auto">'+(t._mktStructure||'?')+'</span></div><div class="hud-gauge"><span class="gauge-label">OB</span><span class="gauge-value" style="width:auto">'+getOBBadge(t)+' '+(t._obSignal||'?')+'</span></div><div class="hud-gauge"><span class="gauge-label">FVG</span><span class="gauge-value" style="width:auto">'+getFVGBadge(t)+' '+(t._fvgSignal||'?')+'</span></div></div><div class="detail-section"><div class="section-title">EXIT</div><div class="hud-gauge"><span class="gauge-label">ENTRY</span><span class="gauge-value" style="color:#ffd700;width:auto">'+(t._entryStrategy||'?')+'</span></div>'+(exit?'<div class="hud-gauge"><span class="gauge-label">TP1</span><span class="gauge-value" style="color:#0f6;width:auto">'+exit.tp1Pct+'</span></div><div class="hud-gauge"><span class="gauge-label">STOP</span><span class="gauge-value" style="color:#f44;width:auto">'+exit.stopLoss+'</span></div>':'')+'</div>'+(backtest?'<div class="detail-section"><div class="section-title">BACKTEST</div><div class="hud-gauge"><span class="gauge-label">PnL</span><span class="gauge-value" style="color:'+(backtest.pnl>0?'#0f6':'#f44')+';width:auto">'+backtest.pnl+'%</span></div></div>':'')+'<div class="detail-section"><div class="section-title">MC ('+(mc.regime||'?')+')</div><div class="hud-gauge"><span class="gauge-label">UP</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(mc.upPct||50)+'%;background:#0f6"></div></div><span class="gauge-value">'+(mc.upPct||50)+'%</span></div><div class="hud-gauge"><span class="gauge-label">DOWN</span><div class="gauge-track"><div class="gauge-fill" style="width:'+(mc.downPct||50)+'%;background:#f44"></div></div><span class="gauge-value">'+(mc.downPct||50)+'%</span></div></div><div class="detail-section"><div class="section-title">REASONS</div>'+rs.pros.map(p=>'<div style="color:#0f0;font-size:0.45rem;margin:1px 0">+'+p+'</div>').join('')+rs.cons.map(c=>'<div style="color:#f44;font-size:0.45rem;margin:1px 0">-'+c+'</div>').join('')+'</div>';
}
function patchCard(div,t){if(!t._dirty)return;t._dirty=false;if(div.classList.contains('skeleton-card')){buildCard(t);return}const d=t.decision||'...',hero=S.hero;div.className='hud-card card-'+(d.toLowerCase().replace(/\s/g,'-'))+(hero&&t.ca===hero.ca?' hero-card':'')+(t._enrichError?' enrich-error':'')+(t._fromCache?' cached':'');const dt=div.querySelector('.decision-tag');if(dt){dt.textContent=d;dt.className='decision-tag decision-'+d.toLowerCase().replace(/\s/g,'-')}const fill=div.querySelector('.score-ring-fill');if(fill){const s=Math.round(t.quad?.final||0);fill.setAttribute('stroke-dashoffset',2*Math.PI*12-(s/100*2*Math.PI*12))}const val=div.querySelector('.score-ring-value');if(val)val.textContent=Math.round(t.quad?.final||0)}
function patchHeroPanel(){const panel=$('heroPanel');if(!panel)return;if(!S.hero){panel.style.display='none';return}panel.style.display='flex';const nameEl=$('heroName');if(nameEl)nameEl.textContent=getName(S.hero);const scoreEl=$('heroScore');if(scoreEl)scoreEl.textContent='A:'+(S.hero._alphaScore||0)+' E:'+(S.hero._entryStrategy||'?');const confEl=$('heroConfidence');if(confEl)confEl.textContent='C:'+(S.hero._conf||0)+'% M:'+(S.hero._moonshotProb||0)+'%'}
function initHeroPanel(){const panel=$('heroPanel');panel.innerHTML='<div class="hero-info"><div class="hero-name" id="heroName"></div><div style="display:flex;gap:8px;font-size:0.55rem;margin-top:2px"><span style="color:#ffd700" id="heroScore"></span><span style="color:#0ff" id="heroConfidence"></span></div></div>'}
function initDashboard(){const dash=$('cockpitDashboard');const panels=[{id:'dash-sb',lbl:'ST.BUY',color:'#ffd700'},{id:'dash-buy',lbl:'BUY',color:'#0f6'},{id:'dash-acc',lbl:'ACC',color:'#0fa'},{id:'dash-wh',lbl:'W.HIGH',color:'#0ff'},{id:'dash-wl',lbl:'W.LOW',color:'#fa0'},{id:'dash-wait',lbl:'WAIT',color:'#f80'},{id:'dash-avoid',lbl:'AVOID',color:'#f66'},{id:'dash-scam',lbl:'SCAM',color:'#f00'},{id:'dash-hero',lbl:'HERO',color:'#ffd700'},{id:'dash-total',lbl:'TOT',color:'#fff'},{id:'dash-aiq',lbl:'AIQ',color:'#0ff'},{id:'dash-accuracy',lbl:'ACC%',color:'#ffd700'},{id:'dash-f1',lbl:'F1',color:'#b0f'},{id:'dash-risk',lbl:'RISK',color:'#f0f'},{id:'dash-bayes',lbl:'BAYES',color:'#0ff'}];panels.forEach(p=>{const div=document.createElement('div');div.className='dash-panel';div.id=p.id;div.innerHTML='<div class="val" style="color:'+p.color+'">0</div><div class="lbl">'+p.lbl+'</div>';dash.appendChild(div)})}
function patchDashboard(){const c=S.dash;const pred=AiEngine.getPredictionMetrics();updatePanel('dash-sb',c.sb,'#ffd700');updatePanel('dash-buy',c.buy,'#0f6');updatePanel('dash-acc',c.acc,'#0fa');updatePanel('dash-wh',c.wh,'#0ff');updatePanel('dash-wl',c.wl,'#fa0');updatePanel('dash-wait',c.wait,'#f80');updatePanel('dash-avoid',c.av,'#f66');updatePanel('dash-scam',c.sc,'#f00');updatePanel('dash-hero',S.hero?S.hero._alphaScore||0:0,'#ffd700');updatePanel('dash-total',c.tot,'#fff');updatePanel('dash-aiq',S.learning.aiQuality+'%','#0ff');updatePanel('dash-accuracy',S.learning.accuracy+'%','#ffd700');updatePanel('dash-f1',pred.f1+'%','#b0f');updatePanel('dash-risk',S.institutionalRisk.total+'%','#f0f');updatePanel('dash-bayes',pred.bayesian+'%','#0ff');patchHeroPanel()}
function updatePanel(id,val,color){const el=$(id);if(!el)return;const valEl=el.querySelector('.val');if(valEl&&valEl.textContent!==String(val)){valEl.textContent=val;valEl.style.color=color;valEl.classList.add('num-pop');setTimeout(()=>valEl.classList.remove('num-pop'),300)}}
function flushRQ(){
if(!S.rq.size)return;
const batch=[...S.rq].slice(0,10);let built=0;
const isFrozen=Date.now()<S.freezeUntil;
batch.forEach(ca=>{
S.rq.delete(ca);
const t=feedMap.get(ca);
if(!t)return;
let div=rendered.get(ca);
if(isFrozen&&(!div||div.classList.contains('skeleton-card'))){S.rq.add(ca);return}
if(!div||div.classList.contains('skeleton-card')){if(built<4){div=buildCard(t);built++}else{S.rq.add(ca)}}else{patchCard(div,t)}
});
if(S.needsSort&&Date.now()>S.freezeUntil){
feedBus.sort((a,b)=>(b._alphaScore||0)-(a._alphaScore||0));
const grid=$('radarFeed');
if(grid){const frag=document.createDocumentFragment();feedBus.forEach(t=>{const div=rendered.get(t.ca);if(div&&!div.classList.contains('skeleton-card'))frag.appendChild(div)});grid.replaceChildren(frag)}
S.needsSort=false}
S.dash={sb:0,buy:0,acc:0,wh:0,wl:0,wait:0,av:0,sc:0,tot:0};
feedBus.forEach(t=>{S.dash.tot++;const d=t.decision;if(d==='STRONG BUY')S.dash.sb++;else if(d==='BUY')S.dash.buy++;else if(d==='ACCUMULATE')S.dash.acc++;else if(d==='WATCH HIGH')S.dash.wh++;else if(d==='WATCH LOW')S.dash.wl++;else if(d==='WAIT')S.dash.wait++;else if(d==='AVOID')S.dash.av++;else S.dash.sc++});
patchDashboard();
if(S.rq.size)requestAnimationFrame(flushRQ)}
return{markDirty,removeCard,renderSkeleton,buildCard,patchCard,flushRQ,initHeroPanel,initDashboard,patchHeroPanel}
})();

function addAILog(msg,type='info'){const el=$('aiConsole');if(!el)return;el.style.display='block';const entry=document.createElement('div');entry.className='log-entry log-'+type;entry.textContent=msg;el.prepend(entry);if(el.children.length>15)el.removeChild(el.lastChild)}

function exportCSV(){const rows=[['Name','CA','Price','Liquidity','Decision','Alpha','Moonshot','MarketCap','Volume1h','Holders','WalletRep','RugStatus']];feedBus.forEach(t=>{const rs=AiEngine.classifyRugStatus(t);rows.push([getName(t),t.ca,t.price||'',t.liq||'',t.decision||'',t._alphaScore||'',t._moonshotProb||'',t.mcap||'',t.vol1h||'',t._hc||'',t._walletRep||'',rs.label]);});const csv=rows.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');downloadFile('nebula_export.csv',csv,'text/csv');}
