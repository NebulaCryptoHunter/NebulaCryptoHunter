    document.addEventListener('click', function(e) { const btn = e.target.closest('[data-action]'); if (!btn) return; e.stopPropagation(); const a = btn.dataset.action, ca = btn.dataset.ca; if (a === 'watch') { const idx = S.watchlist.findIndex(w => w.ca === ca); if (idx >= 0) { S.watchlist.splice(idx, 1); btn.classList.remove('watch-active'); } else { S.watchlist.push({ ca, added: Date.now(), lastScore: 0 }); btn.classList.add('watch-active'); } } else if (a === 'copyca') { copyToClipboard(ca); btn.textContent = 'OK'; setTimeout(() => btn.textContent = 'CA', 1000); } else if (a === 'phantom') { window.open('https://phantom.app/ul/v1/swap/' + ca, '_blank'); } else if (a === 'pump') { window.open('https://pump.fun/coin/' + ca, '_blank'); } else if (a === 'buy') { const t = feedMap.get(ca); if (t) { AiEngine.addToEvalQueue(ca, t.price || 0, t.decision || 'BUY'); btn.textContent = '✓'; setTimeout(() => btn.textContent = 'BUY', 1000); } } });
  } catch (e) { console.error('Binding Error:', e); }
  startup();
}, 300);
})();
</script>
